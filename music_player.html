<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿梭光年 - 音乐播放器</title>
    <style>
        :root {
            --primary-bg: #0f1012;
            --text-color: #e0e0e0;
            --accent-color: #ffffff;
            --dim-text: #666;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Prevent text selection */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            background-image: radial-gradient(circle at 30% 50%, #2a2a2a 0%, #000000 100%);
        }

        /* Layout */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Back Button */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            border: 1px solid var(--border-color);
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .back-btn svg {
            fill: white;
            width: 20px;
            height: 20px;
        }

        /* Main Content (Left/Center) */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-left: 100px; /* Offset for balance */
        }

        .titles {
            position: absolute;
            top: 15%;
            left: 15%;
            text-align: left;
        }

        .main-title {
            font-size: 4em;
            font-family: 'Times New Roman', serif;
            font-weight: lighter;
            opacity: 0.1;
            position: absolute;
            top: -60px;
            left: 0;
            white-space: nowrap;
            pointer-events: none;
        }

        .sub-title {
            font-size: 2.5em;
            font-family: 'STSong', 'SimSun', serif; /* Songti for Chinese traditional feel */
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .album-info {
            font-size: 0.9em;
            color: var(--dim-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid var(--dim-text);
            display: inline-block;
            padding-top: 5px;
            margin-top: 5px;
        }

        /* Vinyl Player */
        .player-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-container {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #111;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.5s ease;
        }

        .vinyl-disk {
            width: 95%;
            height: 95%;
            border-radius: 50%;
            background: repeating-radial-gradient(
                #111 0, 
                #111 2px, 
                #1c1c1c 3px, 
                #1c1c1c 4px
            );
            position: relative;
            animation: spin 10s linear infinite;
            animation-play-state: paused;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .vinyl-disk.playing {
            animation-play-state: running;
        }

        /* Decorative Text */
        .deco-text {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Arial', sans-serif;
            z-index: 1;
        }

        .deco-text.left {
            left: -120px;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .deco-text.right {
            right: -120px;
            text-align: left;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-left: 2px solid rgba(255,255,255,0.2);
            padding-left: 20px;
            border-radius: 50% 0 0 50% / 100px 0 0 100px; /* Curve to match vinyl roughly */
            border-left: none; /* Reset */
            /* Actually, let's just place it */
        }

        /* White curved brackets */
        .player-wrapper::before, .player-wrapper::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 300px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
        }

        .player-wrapper::before {
            left: -40px;
            border-right: none;
            border-radius: 100px 0 0 100px;
        }

        .player-wrapper::after {
            right: -40px;
            border-left: none;
            border-radius: 0 100px 100px 0;
        }

        .big-num {
            font-size: 8em;
            font-weight: bold;
            line-height: 0.8;
            color: rgba(255,255,255,0.1);
        }

        .label {
            font-size: 1.5em;
            letter-spacing: 2px;
        }

        .sub-label {
            font-size: 0.6em;
            margin-top: 50px;
            letter-spacing: 1px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 5px;
        }

        .play-audio-text {
            font-size: 0.7em;
            letter-spacing: 1px;
            align-self: flex-start;
            margin-bottom: auto;
        }

        .song-list-label {
            font-size: 1.5em;
            font-family: 'STSong', serif;
            align-self: flex-end;
            margin-top: auto;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .album-art {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35%;
            height: 35%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 5px solid #111;
            z-index: 2;
        }

        .center-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            background: #000;
            border-radius: 50%;
            z-index: 3;
            border: 2px solid #333;
        }

        /* Controls around vinyl */
        .control-panel {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .btn {
            background: none;
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        .btn-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 0;
            justify-content: center;
        }
        
        .btn-circle svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .play-btn svg {
            width: 24px;
            height: 24px;
            margin-left: 2px; /* Visual centering */
        }

        /* Status Badge */
        .active-badge {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 15px;
            font-size: 0.8em;
            color: #aaa;
            letter-spacing: 1px;
        }

        /* Sidebar (Right) */
        .sidebar {
            width: 350px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 40px;
            border-left: 1px solid var(--border-color);
        }

        .sidebar-header {
            font-family: 'STSong', 'SimSun', serif;
            font-size: 2em;
            margin-bottom: 40px;
            text-align: right;
            opacity: 0.8;
        }

        .playlist {
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .playlist-line {
            position: absolute;
            left: 20px;
            top: 15px;
            bottom: 15px;
            width: 1px;
            background: rgba(255,255,255,0.2);
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 20px 0;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
            position: relative;
        }

        .track-item:hover {
            opacity: 0.8;
        }

        .track-item.active {
            opacity: 1;
        }

        .track-marker {
            width: 12px;
            height: 12px;
            border: 2px solid #888;
            background: #000;
            transform: rotate(45deg);
            margin-right: 20px;
            z-index: 2;
            margin-left: 15px; /* Align with line */
            transition: all 0.3s;
        }

        .track-item.active .track-marker {
            background: #fff;
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .track-item.locked {
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .track-item.locked .track-info {
             filter: blur(0.5px);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .track-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-name {
            font-size: 1em;
            letter-spacing: 1px;
        }

        .lock-icon {
            opacity: 0.5;
            width: 16px;
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Back Button -->
        <div class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </div>

        <!-- Main Area -->
        <div class="main-content">
            <div class="titles">
                <div class="main-title">ETERNAL MEMORY</div>
                <div class="sub-title">穿梭光年</div>
                <div class="album-info" id="currentTrackTitle">天穹裁决</div>
            </div>

            <div class="player-wrapper">
                <!-- Decorative Text around Vinyl (REMOVED) -->
                <div class="vinyl-container">
                    <div class="vinyl-disk" id="vinylDisk">
                        <!-- Generic landscape art for the center -->
                        <div class="album-art" style="background-image: url('https://picsum.photos/200/200?grayscale');"></div>
                        <div class="center-hole"></div>
                    </div>
                </div>
            </div>

            <div class="active-badge">
                当前背景音乐
            </div>

            <div class="control-panel">
                <button class="btn" id="speedBtn">1.0x</button>
                
                <button class="btn btn-circle" id="prevBtn">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                
                <button class="btn btn-circle play-btn" id="playBtn">
                    <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                    <svg viewBox="0 0 24 24" id="pauseIcon" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                
                <button class="btn btn-circle" id="nextBtn">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                播放曲目
            </div>
            
            <div class="playlist" id="playlist">
                <div class="playlist-line"></div>
                <!-- Tracks will be injected here via JS -->
            </div>
        </div>
    </div>

    <script>
        // Track Data
        const tracks = [
            { id: 1, title: '天穹裁决', locked: false },
            { id: 2, title: '铁幕降临', locked: false },
            { id: 3, title: '火种', locked: false },
            { id: 4, title: '反星际殖民运动', locked: false },
            { id: 5, title: '朝圣者的迷途', locked: false },
            { id: 6, title: '星海英灵录', locked: false },
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let playbackSpeed = 1.0;
        const speeds = [1.0, 1.5, 2.0, 0.5];

        // Elements
        const vinylDisk = document.getElementById('vinylDisk');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const playlistContainer = document.getElementById('playlist');
        const currentTrackTitle = document.getElementById('currentTrackTitle');
        const speedBtn = document.getElementById('speedBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Render Playlist
        function renderPlaylist() {
            // Keep the line
            playlistContainer.innerHTML = '<div class="playlist-line"></div>';
            
            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `track-item ${track.locked ? 'locked' : ''} ${index === currentIndex ? 'active' : ''}`;
                item.onclick = () => {
                    if (!track.locked) {
                        changeTrack(index);
                    }
                };

                const marker = document.createElement('div');
                marker.className = 'track-marker';

                const info = document.createElement('div');
                info.className = 'track-info';

                // Cleaned up rendering logic since locks are gone
                info.innerHTML = `
                    <span class="track-name" style="margin-left: 0;">${track.title}</span>
                `;

                item.appendChild(marker);
                item.appendChild(info);
                playlistContainer.appendChild(item);
            });
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            updatePlayState();
        }

        function updatePlayState() {
            if (isPlaying) {
                vinylDisk.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                // Adjust animation speed based on playbackSpeed
                vinylDisk.style.animationDuration = `${10 / playbackSpeed}s`;
            } else {
                vinylDisk.classList.remove('playing');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                // Note: paused state handles the rotation freeze
            }
        }

        function changeTrack(index) {
            if (index < 0 || index >= tracks.length || tracks[index].locked) return;
            
            currentIndex = index;
            currentTrackTitle.innerText = tracks[index].title;
            
            // Random color/image change for variety effect
            const hue = (index * 60) % 360;
            const art = document.querySelector('.album-art');
            // Mock changing art
            // art.style.filter = `hue-rotate(${hue}deg)`;

            renderPlaylist();
            
            // If was playing, keep playing. If not, auto play? Let's keep state.
            // Reset animation slightly to give feedback
            vinylDisk.classList.remove('playing');
            void vinylDisk.offsetWidth; // trigger reflow
            if (isPlaying) {
                vinylDisk.classList.add('playing');
            }
        }

        function changeSpeed() {
            const currentSpeedIndex = speeds.indexOf(playbackSpeed);
            const nextSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
            playbackSpeed = speeds[nextSpeedIndex];
            speedBtn.innerText = playbackSpeed.toFixed(1) + 'x';
            
            if (isPlaying) {
                vinylDisk.style.animationDuration = `${10 / playbackSpeed}s`;
            }
        }

        // Event Listeners
        playBtn.addEventListener('click', togglePlay);
        
        prevBtn.addEventListener('click', () => {
            let newIndex = currentIndex - 1;
            while (newIndex >= 0 && tracks[newIndex].locked) {
                newIndex--;
            }
            if (newIndex >= 0) changeTrack(newIndex);
        });

        nextBtn.addEventListener('click', () => {
            let newIndex = currentIndex + 1;
            // Find next unlocked
            while (newIndex < tracks.length && tracks[newIndex].locked) {
                 // For this demo, let's assume we can't skip over locked tracks to find an unlocked one if they are sequential blocks
                 // But let's check
                 newIndex++;
            }
            // If we found a valid one
            if (newIndex < tracks.length && !tracks[newIndex].locked) {
                changeTrack(newIndex);
            }
        });

        speedBtn.addEventListener('click', changeSpeed);

        // Initial Render
        renderPlaylist();

    </script>
</body>
</html>
