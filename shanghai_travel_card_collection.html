<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海文旅卡牌收藏</title>
    <style>
        :root {
            --bg: #f4f7fc;
            --panel: #ffffff;
            --line: #e8edf6;
            --text-main: #2a3446;
            --text-sub: #8e9ab0;
            --brand: #19c6ee;
            --brand-dark: #11b4db;
            --chip: #eff3fa;
            --shadow: 0 10px 24px rgba(25, 40, 75, 0.08);
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            min-height: 100vh;
        }

        .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 220px 1fr;
        }

        .sidebar {
            background: var(--panel);
            border-right: 1px solid var(--line);
            padding: 18px 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 0 8px;
            font-weight: 800;
            color: #49556d;
        }

        .brand-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6bdfff, #16bee8);
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 13px;
        }

        .menu {
            list-style: none;
            display: grid;
            gap: 6px;
        }

        .menu-btn {
            width: 100%;
            border: 0;
            border-radius: 8px;
            background: transparent;
            text-align: left;
            padding: 10px 12px;
            color: #93a1b9;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .menu-btn.active {
            color: #293447;
            background: #fff;
            border: 1px solid #edf1f7;
            box-shadow: 0 3px 12px rgba(10, 30, 64, 0.08);
        }

        .content {
            padding: 14px 18px 20px;
        }

        .topbar {
            display: grid;
            grid-template-columns: auto minmax(220px, 420px) auto;
            align-items: center;
            gap: 10px;
        }

        .title {
            font-size: 33px;
            font-weight: 900;
            color: #2d3850;
            letter-spacing: 0.2px;
        }

        .search-wrap {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 40px;
        }

        .search-wrap input {
            border: 0;
            outline: none;
            padding: 10px 12px;
            font-size: 14px;
            color: #40506c;
        }

        .search-wrap input::placeholder {
            color: #b1bdcf;
        }

        .search-btn {
            border: 0;
            cursor: pointer;
            background: var(--brand);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
        }

        .view-switch {
            justify-self: end;
            display: flex;
            gap: 8px;
        }

        .view-btn {
            border: 0;
            border-radius: 6px;
            background: #9eabbf;
            color: #fff;
            padding: 9px 13px;
            font-size: 14px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
        }

        .view-btn.active {
            background: var(--brand);
        }

        .filters {
            margin-top: 10px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
        }

        .chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            border: 1px solid transparent;
            border-radius: 999px;
            background: var(--chip);
            color: #60708d;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            cursor: pointer;
        }

        .chip.active {
            background: #e2f9ff;
            color: #1088a8;
            border-color: #aceeff;
        }

        .sort {
            height: 34px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0 10px;
            color: #546178;
            background: #fff;
            font-size: 13px;
        }

        .progress {
            color: #6f7e98;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .progress strong {
            color: #2d3a53;
        }

        .cards {
            margin-top: 12px;
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
        }

        .cards.list-mode {
            grid-template-columns: 1fr;
        }

        .card {
            background: #fff;
            border: 1px solid #edf1f7;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(29, 47, 83, 0.06);
            padding: 8px;
            cursor: pointer;
            transition: 0.15s ease;
        }

        .card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .card-art {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            background-color: #d2dae8;
            border: 1px solid #dde5f3;
            padding-top: 145%;
            background-repeat: no-repeat;
        }

        .card-rarity {
            position: absolute;
            left: 7px;
            top: 7px;
            z-index: 2;
            background: rgba(8, 22, 50, 0.82);
            color: #fff;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 7px;
        }

        .card-name {
            margin-top: 8px;
            font-size: 14px;
            font-weight: 800;
            color: #2b3446;
        }

        .card-set {
            margin-top: 2px;
            font-size: 12px;
            color: #8693a9;
            font-weight: 700;
        }

        .cards.list-mode .card {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 11px;
            align-items: center;
        }

        .cards.list-mode .card-art {
            padding-top: 165px;
        }

        .cards.list-mode .card-name {
            margin-top: 0;
            font-size: 17px;
        }

        .cards.list-mode .card-set {
            font-size: 13px;
        }

        .empty {
            background: #fff;
            border: 1px dashed #c9d5e8;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #7d8ca7;
            grid-column: 1 / -1;
            font-size: 14px;
            font-weight: 700;
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(11, 18, 32, 0.55);
            z-index: 20;
            padding: 20px;
        }

        .modal.open {
            display: flex;
        }

        .modal-body {
            background: #fff;
            width: min(940px, 100%);
            border-radius: 14px;
            border: 1px solid #e4eaf5;
            box-shadow: 0 20px 38px rgba(19, 33, 59, 0.2);
            display: grid;
            grid-template-columns: 330px 1fr;
            overflow: hidden;
        }

        .modal-art {
            min-height: 460px;
            background-repeat: no-repeat;
            background-color: #d6deeb;
        }

        .modal-content {
            padding: 18px 20px;
        }

        .close-btn {
            float: right;
            border: 0;
            background: transparent;
            font-size: 22px;
            color: #7e8ca3;
            cursor: pointer;
        }

        .modal-rarity {
            display: inline-block;
            background: #e8f8fe;
            color: #0e8ba9;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 800;
            margin-top: 12px;
        }

        .modal-title {
            margin-top: 10px;
            font-size: 26px;
            font-weight: 900;
            color: #263248;
        }

        .modal-desc {
            margin-top: 10px;
            color: #687891;
            line-height: 1.75;
            font-size: 14px;
        }

        .detail-list {
            margin-top: 14px;
            display: grid;
            gap: 8px;
        }

        .detail-item {
            border: 1px solid #e5ebf6;
            border-radius: 8px;
            background: #f8fafe;
            padding: 10px;
            color: #4f607d;
            font-size: 13px;
            font-weight: 700;
        }

        @media (max-width: 1400px) {
            .cards {
                grid-template-columns: repeat(5, minmax(120px, 1fr));
            }
        }

        @media (max-width: 1180px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .topbar {
                grid-template-columns: 1fr;
            }

            .view-switch {
                justify-self: start;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .cards {
                grid-template-columns: repeat(3, minmax(120px, 1fr));
            }

            .modal-body {
                grid-template-columns: 1fr;
            }

            .modal-art {
                min-height: 260px;
            }
        }

        @media (max-width: 760px) {
            .cards {
                grid-template-columns: repeat(2, minmax(120px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <span class="brand-icon">沪</span>
                <span>上海文旅卡牌库</span>
            </div>
            <ul class="menu">
                <li><button class="menu-btn active">首页</button></li>
                <li><button class="menu-btn">卡牌交易</button></li>
                <li><button class="menu-btn">系统设置</button></li>
            </ul>
        </aside>

        <main class="content">
            <header class="topbar">
                <h1 class="title" id="titleText">收藏（0 / 102）</h1>
                <div class="search-wrap">
                    <input id="searchInput" type="text" placeholder="搜索卡牌名称 / 区域 / 系列">
                    <button class="search-btn" id="searchBtn" aria-label="搜索">⌕</button>
                </div>
                <div class="view-switch">
                    <button class="view-btn" data-view="list">☰ 列表</button>
                    <button class="view-btn active" data-view="grid">▦ 网格</button>
                </div>
            </header>

            <section class="filters">
                <div class="chips" id="rarityChips">
                    <button class="chip active" data-rarity="ALL">全部</button>
                    <button class="chip" data-rarity="SSR">SSR</button>
                    <button class="chip" data-rarity="SR">SR</button>
                    <button class="chip" data-rarity="R">R</button>
                    <button class="chip" data-rarity="N">N</button>
                </div>
                <select class="sort" id="sortSelect" aria-label="排序">
                    <option value="rarity">按稀有度</option>
                    <option value="newest">按入手时间</option>
                    <option value="name">按名称</option>
                </select>
                <div class="progress">收集进度：<strong id="progressText">0 / 102</strong></div>
            </section>

            <section id="cardGrid" class="cards"></section>
        </main>
    </div>

    <aside class="modal" id="detailModal">
        <div class="modal-body">
            <div class="modal-art" id="modalArt"></div>
            <div class="modal-content">
                <button class="close-btn" id="closeModal" aria-label="关闭">×</button>
                <span class="modal-rarity" id="modalRarity">SR</span>
                <h2 class="modal-title" id="modalTitle">卡牌标题</h2>
                <p class="modal-desc" id="modalDesc">卡牌描述</p>
                <div class="detail-list" id="modalDetails"></div>
            </div>
        </div>
    </aside>

        const sortSelect = document.getElementById("sortSelect");
        const chips = Array.from(document.querySelectorAll(".chip"));
        const viewButtons = Array.from(document.querySelectorAll(".view-btn"));

        const detailModal = document.getElementById("detailModal");
        const modalArt = document.getElementById("modalArt");
        const modalRarity = document.getElementById("modalRarity");
        const modalTitle = document.getElementById("modalTitle");
        const modalDesc = document.getElementById("modalDesc");
        const modalDetails = document.getElementById("modalDetails");
        const closeModal = document.getElementById("closeModal");

        let activeRarity = "ALL";

        function applySprite(artEl, card) {
            const sheet = spriteSheets[card.sheet];
            const x = sheet.cols === 1 ? 0 : (card.col / (sheet.cols - 1)) * 100;
            const y = sheet.rows === 1 ? 0 : (card.row / (sheet.rows - 1)) * 100;
            artEl.style.backgroundImage = `url('${sheet.src}')`;
            artEl.style.backgroundSize = `${sheet.cols * 100}% ${sheet.rows * 100}%`;
            artEl.style.backgroundPosition = `${x}% ${y}%`;
        }

        function getFilteredCards() {
            const keyword = searchInput.value.trim().toLowerCase();
            let list = cards.filter((card) => {
                const rarityMatch = activeRarity === "ALL" || card.rarity === activeRarity;
                const keywordMatch =
                    card.name.toLowerCase().includes(keyword) ||
                    card.district.toLowerCase().includes(keyword) ||
                    card.series.toLowerCase().includes(keyword);
                return rarityMatch && keywordMatch;
            });

            const sortMode = sortSelect.value;
            if (sortMode === "rarity") {
                list = list.sort((a, b) => rarityOrder[a.rarity] - rarityOrder[b.rarity]);
            } else if (sortMode === "newest") {
                list = list.sort((a, b) => (a.unlockedAt < b.unlockedAt ? 1 : -1));
            } else if (sortMode === "name") {
                list = list.sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));
            }
            return list;
        }

        function renderCards() {
            const list = getFilteredCards();
            cardGrid.innerHTML = "";
            titleText.textContent = `收藏（${list.length} / ${totalCardCount}）`;
            progressText.textContent = `${cards.length} / ${totalCardCount}`;

            if (list.length === 0) {
                const empty = document.createElement("div");
                empty.className = "empty";
                empty.textContent = "没有匹配的卡牌，请更换关键词或筛选条件。";
                cardGrid.appendChild(empty);
                return;
            }

            list.forEach((card) => {
                const cardEl = document.createElement("article");
                cardEl.className = "card";
                cardEl.innerHTML = `
                    <div class="card-art">
                        <span class="card-rarity">${card.rarity}</span>
                    </div>
                    <div>
                        <div class="card-name">${card.name}</div>
                        <div class="card-set">${card.district} · ${card.series}</div>
                    </div>
                `;
                const art = cardEl.querySelector(".card-art");
                applySprite(art, card);
                cardEl.addEventListener("click", () => openModal(card));
                cardGrid.appendChild(cardEl);
            });
        }

        function openModal(card) {
            modalRarity.textContent = card.rarity;
            modalTitle.textContent = card.name;
            modalDesc.textContent = card.desc;
            modalDetails.innerHTML = [
                `区域：${card.district}`,
                `系列：${card.series}`,
                `入手时间：${card.unlockedAt}`,
                ...card.detail
            ].map((item) => `<div class="detail-item">${item}</div>`).join("");
            applySprite(modalArt, card);
            detailModal.classList.add("open");
        }

        chips.forEach((chip) => {
            chip.addEventListener("click", () => {
                chips.forEach((c) => c.classList.remove("active"));
                chip.classList.add("active");
                activeRarity = chip.dataset.rarity;
                renderCards();
            });
        });

        searchInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                renderCards();
            }
        });
        searchBtn.addEventListener("click", renderCards);
        sortSelect.addEventListener("change", renderCards);

        viewButtons.forEach((button) => {
            button.addEventListener("click", () => {
                viewButtons.forEach((btn) => btn.classList.remove("active"));
                button.classList.add("active");
                cardGrid.classList.toggle("list-mode", button.dataset.view === "list");
            });
        });

        closeModal.addEventListener("click", () => detailModal.classList.remove("open"));
        detailModal.addEventListener("click", (event) => {
            if (event.target === detailModal) {
                detailModal.classList.remove("open");
            }
        });

        renderCards();
    </script>
</body>
</html>
