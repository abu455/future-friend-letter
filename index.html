<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EARTH EXPO 2026 - 星际殖民艺术展</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff41;
            --dark-bg: #020205;
            --card-bg: rgba(20, 20, 35, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* Prevent default touch scrolling */
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Stars Animation */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(1px 1px at 10% 10%, white, transparent),
                radial-gradient(1px 1px at 20% 20%, white, transparent),
                radial-gradient(2px 2px at 30% 30%, white, transparent),
                radial-gradient(1px 1px at 40% 40%, white, transparent),
                radial-gradient(2px 2px at 50% 50%, white, transparent),
                radial-gradient(1px 1px at 60% 60%, white, transparent),
                radial-gradient(2px 2px at 70% 70%, white, transparent),
                radial-gradient(1px 1px at 80% 80%, white, transparent),
                radial-gradient(1px 1px at 90% 90%, white, transparent);
            background-size: 200px 200px;
            animation: stars-move 100s linear infinite;
            opacity: 0.5;
            z-index: 0;
        }

        @keyframes stars-move {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05), transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.05), transparent 40%);
            z-index: 0;
            filter: blur(30px);
        }

        /* Check-in Area / Scanner */
        .scanner-container {
            position: relative;
            width: 360px; /* Base width for mobile */
            height: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* The Ticket */
        .ticket-wrapper {
            position: absolute;
            width: 320px;
            height: 500px; /* Ticket Height */
            perspective: 1000px;
            z-index: 20;
            transition: transform 0.1s ease-out; /* Smooth follow */
        }

        .ticket {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 
                        0 0 20px rgba(0, 243, 255, 0.2);
            display: flex;
            flex-direction: column;
        }

        /* Holographic sheen effect */
        .ticket::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                115deg, 
                transparent 30%, 
                rgba(255, 255, 255, 0.05) 45%, 
                rgba(255, 255, 255, 0.1) 50%, 
                rgba(255, 255, 255, 0.05) 55%, 
                transparent 70%
            );
            transform: skewX(-20deg);
            pointer-events: none;
        }

        .ticket-header {
            padding: 20px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan);
            letter-spacing: 2px;
        }

        .ticket-body {
            padding: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .event-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            line-height: 1.2;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .event-subtitle {
            font-size: 0.9rem;
            color: var(--neon-pink);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .info-item span {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: #fff;
        }

        .qr-placeholder {
            align-self: center;
            width: 120px;
            height: 120px;
            background: #fff;
            padding: 5px;
            border-radius: 5px;
            image-rendering: pixelated;
            /* Placeholder pattern for QR */
            background-image: 
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000);
            background-size: 10px 10px;
            background-position: 0 0, 5px 5px;
            opacity: 0.9;
        }

        .ticket-footer {
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .ticket-footer .id {
            color: var(--neon-cyan);
        }

        /* Interaction Guide */
        .guide-track {
            position: absolute;
            top: 50%; /* Center vertically behind ticket initially */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            height: 600px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            pointer-events: none; /* Let clicks pass through */
        }

        .scan-zone {
            width: 100%;
            height: 150px;
            margin-top: -80px; /* Position above */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .scan-zone.active {
            opacity: 1;
        }
        
        .scan-zone-text {
            font-family: 'Orbitron';
            color: var(--neon-cyan);
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--neon-cyan);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .arrow-up {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 2rem;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); opacity: 0.3; }
            50% { transform: translate(-50%, -10px); opacity: 0.8; }
        }

        /* Success State */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .success-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .success-circle {
            width: 100px;
            height: 100px;
            border: 5px solid var(--neon-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px var(--neon-green);
            margin-bottom: 30px;
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-overlay.visible .success-circle {
            transform: scale(1);
        }

        .checkmark {
            color: var(--neon-green);
            font-size: 3rem;
        }

        .success-text {
            font-family: 'Orbitron';
            font-size: 2rem;
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s 0.2s;
        }

        .success-overlay.visible .success-text {
            transform: translateY(0);
            opacity: 1;
        }

        /* Laser Scan Effect */
        .laser-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            opacity: 0;
            pointer-events: none;
        }

        .scanning .laser-line {
            opacity: 1;
            animation: scan 1.5s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="nebula"></div>

    <div class="scanner-container">
        
        <div class="guide-track">
            <div class="scan-zone" id="scanZone">
                <div class="scan-zone-text">SCAN ZONE</div>
            </div>
            <div class="arrow-up" id="arrow">▲</div>
        </div>

        <div class="ticket-wrapper" id="ticket">
            <div class="ticket">
                <div class="ticket-header">
                    <div class="logo">EARTH EXPO</div>
                    <div class="logo" style="font-size: 0.8rem; color: #fff;">2026</div>
                </div>
                <div class="ticket-body">
                    <div>
                        <div class="event-title">ETERNAL<br>MEMORY</div>
                        <div class="event-subtitle">Interstellar Colonization Art Exhibition</div>
                    </div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <label>DATE</label>
                            <span>JAN 24</span>
                        </div>
                        <div class="info-item">
                            <label>TIME</label>
                            <span>14:00</span>
                        </div>
                        <div class="info-item">
                            <label>GATE</label>
                            <span style="color: var(--neon-cyan)">A-01</span>
                        </div>
                        <div class="info-item">
                            <label>CLASS</label>
                            <span>VIP</span>
                        </div>
                    </div>

                    <div class="qr-placeholder" style="display: flex; justify-content: center; align-items: center; color: black; font-weight: bold; font-family: monospace;">
                        [QR CODE]
                    </div>
                </div>
                <div class="ticket-footer">
                    <span>TICKET ID</span>
                    <span class="id">#8X9-2026-COL</span>
                </div>
                <div class="laser-line" id="laser"></div>
            </div>
        </div>

    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="success-circle">
            <span class="checkmark">✔</span>
        </div>
        <div class="success-text">ACCESS<br>GRANTED</div>
        <p style="margin-top: 20px; font-family: 'Share Tech Mono'; color: #aaa;">Welcome to the future.</p>
    </div>

    <script>
        const ticket = document.getElementById('ticket');
        const scanZone = document.getElementById('scanZone');
        const successOverlay = document.getElementById('successOverlay');
        const arrow = document.getElementById('arrow');
        const laser = document.getElementById('laser');

        let startY = 0;
        let currentY = 0;
        let isDragging = false;
        let initialTop = 0; // Will be set on load
        
        // Settings
        const SCAN_THRESHOLD = -200; // Pixel distance to move up to trigger scan

        // Initialize position
        function init() {
            // We want the ticket centered initially
            ticket.style.transform = `translateY(0px)`;
        }
        
        // Helper to get Y position
        function getY(e) {
            return e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        }

        function onStart(e) {
            if (successOverlay.classList.contains('visible')) return;
            isDragging = true;
            startY = getY(e);
            
            // Remove transition for direct 1:1 movement
            ticket.style.transition = 'none';
            ticket.style.cursor = 'grabbing';
            arrow.style.opacity = '0';
        }

        function onMove(e) {
            if (!isDragging) return;
            e.preventDefault(); // Prevent scrolling
            
            const y = getY(e);
            const deltaY = y - startY;

            // Constrain: Can only move UP (negative deltaY), with some resistance downwards
            let moveY = deltaY;
            
            // Resistance when pulling down
            if (moveY > 0) moveY = moveY * 0.3;

            // Apply transform
            ticket.style.transform = `translateY(${moveY}px) rotateX(${moveY * -0.05}deg)`;

            // Visual feedback when approaching scan zone
            if (moveY < -100) {
                scanZone.classList.add('active');
                ticket.querySelector('.ticket').style.boxShadow = `0 0 50px var(--neon-cyan)`;
            } else {
                scanZone.classList.remove('active');
                ticket.querySelector('.ticket').style.boxShadow = '';
            }
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            ticket.style.cursor = 'grab';
            
            // Restore transition for smooth snap back/forward
            ticket.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';

            // Get current transform value (roughly)
            const style = window.getComputedStyle(ticket);
            const matrix = new WebKitCSSMatrix(style.transform);
            const currentTranslateY = matrix.m42;

            if (currentTranslateY < SCAN_THRESHOLD) {
                // Success! Move ticket completely out of view (upwards)
                ticket.style.transform = `translateY(-100vh) rotateX(20deg) scale(0.8)`;
                
                // Trigger Scan Effect
                setTimeout(() => {
                    success();
                }, 300);
            } else {
                // Snap back
                ticket.style.transform = `translateY(0px)`;
                arrow.style.opacity = '';
                scanZone.classList.remove('active');
                ticket.querySelector('.ticket').style.boxShadow = '';
            }
        }

        function success() {
            successOverlay.classList.add('visible');
        }

        // Event Listeners
        ticket.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);

        ticket.addEventListener('touchstart', onStart, { passive: false });
        window.addEventListener('touchmove', onMove, { passive: false });
        window.addEventListener('touchend', onEnd);

        init();

    </script>
</body>
</html>
