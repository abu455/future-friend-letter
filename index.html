<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古黑胶音乐播放器</title>
    <style>
        :root {
            --primary-color: #e94560;
            --secondary-color: #1a1a2e;
            --text-color: #ffffff;
            --bg-color: #16213e;
            --vinyl-size: 300px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: row;
            background-color: var(--secondary-color);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            width: 900px;
            max-width: 100%;
            height: 500px;
        }

        /* 左侧播放器区域 */
        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: linear-gradient(145deg, #1f1f35, #151525);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 黑胶唱片样式 */
        .vinyl-wrapper {
            position: relative;
            width: var(--vinyl-size);
            height: var(--vinyl-size);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
            transition: transform 0.3s ease;
        }

        .vinyl-record {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(
                #111 0, 
                #111 2px, 
                #222 3px, 
                #222 4px
                );
            position: relative;
            animation: rotate 10s linear infinite;
            animation-play-state: paused;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vinyl-record::before {
            content: '';
            position: absolute;
            width: 35%;
            height: 35%;
            background-color: var(--primary-color);
            border-radius: 50%;
            border: 4px solid #fff;
            background-image: url('https://placeholder.com/150'); 
            background-size: cover;
        }

        .vinyl-record::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #000;
            border-radius: 50%;
            border: 3px solid #fff;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl-wrapper.playing .vinyl-record {
            animation-play-state: running;
        }

        /* 唱针样式 */
        .tone-arm {
            position: absolute;
            top: -20px;
            right: 0px;
            width: 120px;
            height: 180px;
            transform-origin: 20px 20px;
            transform: rotate(-30deg);
            transition: transform 0.5s ease;
            z-index: 10;
            pointer-events: none;
        }

        .tone-arm::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            width: 20px;
            height: 20px;
            background: #aaa;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .tone-arm::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 19px;
            width: 6px;
            height: 140px;
            background: #888;
            transform: rotate(15deg);
        }

        .tone-arm-head {
            position: absolute;
            bottom: 0;
            right: 35px;
            width: 30px;
            height: 40px;
            background: #444;
            transform: rotate(15deg);
            border-radius: 4px;
        }

        .vinyl-wrapper.playing + .tone-arm {
            transform: rotate(5deg);
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            color: var(--primary-color);
        }

        .btn-large {
            font-size: 40px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-large:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .speed-control {
            position: relative;
        }

        .speed-btn {
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            border-radius: 15px;
        }

        /* 右侧列表区域 */
        .playlist-section {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        .playlist-header {
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .playlist {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .song-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .song-item.active {
            background: linear-gradient(90deg, var(--primary-color), #c0394d);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .song-info {
            display: flex;
            flex-direction: column;
        }

        .song-title {
            font-weight: bold;
            margin-bottom: 4px;
        }

        .song-artist {
            font-size: 12px;
            opacity: 0.7;
        }

        .playing-indicator {
            width: 20px;
            height: 20px;
            display: none;
        }

        .active .playing-indicator {
            display: block;
        }

        /* 滚动条美化 */
        .playlist::-webkit-scrollbar {
            width: 6px;
        }

        .playlist::-webkit-scrollbar-track {
            background: transparent;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                width: 100%;
            }
            
            .vinyl-wrapper {
                width: 200px;
                height: 200px;
                margin-bottom: 60px; /* Space for tone arm */
            }
            
            .playlist-section {
                height: 300px;
            }

            .tone-arm {
                transform-origin: 20px 20px;
                right: -20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="player-section">
        <div class="vinyl-wrapper" id="vinylWrapper">
            <div class="vinyl-record"></div>
            <div class="tone-arm">
                <div class="tone-arm-head"></div>
            </div>
        </div>
        
        <div class="song-details" style="margin-bottom: 20px; text-align: center;">
            <h2 id="currentTitle" style="margin-bottom: 5px;">选择一首歌</h2>
            <p id="currentArtist" style="font-size: 14px; opacity: 0.7;">--</p>
        </div>

        <div class="controls">
            <!-- 倍速 -->
            <button class="btn speed-btn" id="speedBtn" title="倍速">1.0x</button>
            
            <!-- 上一首 -->
            <button class="btn" id="prevBtn" title="上一首">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <!-- 播放/暂停 -->
            <button class="btn btn-large" id="playPauseBtn" title="播放">
                <svg id="playIcon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pauseIcon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            
            <!-- 下一首 -->
            <button class="btn" id="nextBtn" title="下一首">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <div class="playlist-section">
        <div class="playlist-header">播放列表</div>
        <div class="playlist" id="playlist">
            <!-- 歌曲列表将通过JS生成 -->
        </div>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    // 模拟歌曲数据
    const songs = [
        {
            title: "Summer Breeze",
            artist: "Relaxing Vibes",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        },
        {
            title: "Midnight City",
            artist: "Synth Wave",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
        },
        {
            title: "Jazz Cafe",
            artist: "Coffee Shop",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
        },
        {
            title: "Deep Focus",
            artist: "Work Flow",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"
        },
        {
            title: "Morning Routine",
            artist: "Daily Life",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3"
        },
        {
            title: "Dreamscape",
            artist: "Sleep Well",
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-16.mp3"
        }
    ];

    const audioPlayer = document.getElementById('audioPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const speedBtn = document.getElementById('speedBtn');
    const playlistContainer = document.getElementById('playlist');
    const vinylWrapper = document.getElementById('vinylWrapper');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const currentTitle = document.getElementById('currentTitle');
    const currentArtist = document.getElementById('currentArtist');

    let currentIndex = 0;
    let isPlaying = false;
    let speeds = [0.5, 1.0, 1.25, 1.5, 2.0];
    let currentSpeedIndex = 1;

    // 初始化播放列表
    function initPlaylist() {
        playlistContainer.innerHTML = '';
        songs.forEach((song, index) => {
            const item = document.createElement('div');
            item.className = `song-item ${index === currentIndex ? 'active' : ''}`;
            item.innerHTML = `
                <div class="song-info">
                    <div class="song-title">${song.title}</div>
                    <div class="song-artist">${song.artist}</div>
                </div>
                <div class="playing-indicator">🎵</div>
            `;
            item.addEventListener('click', () => playSong(index));
            playlistContainer.appendChild(item);
        });
    }

    // 播放指定歌曲
    function playSong(index) {
        // 如果点击的是当前正在播放的歌，则切换播放/暂停
        if (index === currentIndex && audioPlayer.src) {
            togglePlay();
            return;
        }

        currentIndex = index;
        loadSong(currentIndex);
        audioPlayer.play().then(() => {
            isPlaying = true;
            updateUI();
        }).catch(err => {
            console.error("Playback failed", err);
            isPlaying = false;
            updateUI();
        });
    }

    // 加载歌曲信息
    function loadSong(index) {
        const song = songs[index];
        audioPlayer.src = song.url;
        audioPlayer.playbackRate = speeds[currentSpeedIndex];
        currentTitle.textContent = song.title;
        currentArtist.textContent = song.artist;
        updatePlaylistHighlight();
    }

    // 更新播放列表高亮
    function updatePlaylistHighlight() {
        const items = playlistContainer.children;
        for (let i = 0; i < items.length; i++) {
            if (i === currentIndex) {
                items[i].classList.add('active');
            } else {
                items[i].classList.remove('active');
            }
        }
    }

    // 切换播放/暂停状态
    function togglePlay() {
        if (isPlaying) {
            audioPlayer.pause();
        } else {
            // 如果没有源，加载第一首
            if (!audioPlayer.src) {
                loadSong(currentIndex);
            }
            audioPlayer.play();
        }
        isPlaying = !isPlaying;
        updateUI();
    }

    // 更新UI显示（图标、黑胶动画）
    function updateUI() {
        if (isPlaying) {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            vinylWrapper.classList.add('playing');
        } else {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            vinylWrapper.classList.remove('playing');
        }
    }

    // 下一首
    function nextSong() {
        currentIndex = (currentIndex + 1) % songs.length;
        playSong(currentIndex);
    }

    // 上一首
    function prevSong() {
        currentIndex = (currentIndex - 1 + songs.length) % songs.length;
        playSong(currentIndex);
    }

    // 切换倍速
    function toggleSpeed() {
        currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
        const speed = speeds[currentSpeedIndex];
        audioPlayer.playbackRate = speed;
        speedBtn.textContent = speed + 'x';
    }

    // 事件监听
    playPauseBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextSong);
    prevBtn.addEventListener('click', prevSong);
    speedBtn.addEventListener('click', toggleSpeed);

    // 自动播放下一首
    audioPlayer.addEventListener('ended', nextSong);

    // 初始化
    initPlaylist();
    // 加载第一首但不播放
    loadSong(currentIndex);

</script>
</body>
</html>
